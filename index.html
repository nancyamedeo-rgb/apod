<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Astronomy Picture of the Day</title>
<style>
  :root {
    color-scheme: dark;
  }
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  #apod-root {
    position: relative;
    width: 100%;
    height: 100%;
    background: #000;
  }
  #apod-media-wrap {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
  }
  #apod-media-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  #apod-media-wrap iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }
  #apod-overlay {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    padding: 1.6em 2em 1.5em;
    background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.65) 45%, rgba(0,0,0,0) 100%);
    color: #f2f2f2;
    box-sizing: border-box;
  }
  #apod-title {
    font-size: 1.5em;
    font-weight: 600;
    margin: 0 0 0.3em 0;
    line-height: 1.25;
    text-shadow: 0 1px 4px rgba(0,0,0,0.6);
  }
  #apod-date {
    font-size: 0.78em;
    font-weight: 400;
    opacity: 0.65;
    margin-left: 0.6em;
    letter-spacing: 0.02em;
  }
  #apod-explanation {
    font-size: 0.92em;
    line-height: 1.45;
    margin: 0;
    max-width: 90ch;
    color: #d8d8d8;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);

    /* Clamp long explanations so the overlay doesn't take over the screen */
    display: -webkit-box;
    -webkit-line-clamp: 5;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  #apod-status {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #999;
    font-size: 1em;
    text-align: center;
    padding: 2em;
    box-sizing: border-box;
  }
  .apod-hidden { display: none !important; }
</style>
</head>
<body>

<div id="apod-root">
  <div id="apod-status">Loading today's Astronomy Picture of the Day…</div>

  <div id="apod-media-wrap" class="apod-hidden"></div>

  <div id="apod-overlay" class="apod-hidden">
    <h1 id="apod-title">
      <span id="apod-title-text"></span><span id="apod-date"></span>
    </h1>
    <p id="apod-explanation"></p>
  </div>
</div>

<script>
(function () {
  // ===== CONFIG =====
  var API_KEY = "WZBVWel7GfstUWbkUj4DtGL982VW3cXZW2VJands";
  var API_URL = "https://api.nasa.gov/planetary/apod?api_key=" + API_KEY;

  // How often to re-check for a new APOD (ms). 6 hours is plenty since it updates once a day.
  var REFRESH_INTERVAL = 6 * 60 * 60 * 1000;

  // localStorage key for simple caching across reloads
  var CACHE_KEY = "apod_dakboard_cache_v1";

  var statusEl = document.getElementById("apod-status");
  var mediaWrap = document.getElementById("apod-media-wrap");
  var overlay = document.getElementById("apod-overlay");
  var titleText = document.getElementById("apod-title-text");
  var dateEl = document.getElementById("apod-date");
  var explanationEl = document.getElementById("apod-explanation");

  function showStatus(msg) {
    statusEl.textContent = msg;
    statusEl.classList.remove("apod-hidden");
    mediaWrap.classList.add("apod-hidden");
    overlay.classList.add("apod-hidden");
  }

  function formatDate(dateStr) {
    try {
      var parts = dateStr.split("-");
      var d = new Date(parts[0], parts[1] - 1, parts[2]);
      return d.toLocaleDateString(undefined, { year: "numeric", month: "long", day: "numeric" });
    } catch (e) {
      return dateStr;
    }
  }

  function render(data) {
    mediaWrap.innerHTML = "";

    if (data.media_type === "image") {
      var img = document.createElement("img");
      img.src = data.hdurl || data.url;
      img.alt = data.title || "Astronomy Picture of the Day";
      img.onerror = function () {
        // fall back to the standard-res url if hdurl fails
        if (img.src !== data.url) {
          img.src = data.url;
        }
      };
      mediaWrap.appendChild(img);
    } else if (data.media_type === "video") {
      var iframe = document.createElement("iframe");
      iframe.src = data.url;
      iframe.setAttribute("allow", "autoplay; fullscreen; encrypted-media");
      iframe.setAttribute("allowfullscreen", "true");
      mediaWrap.appendChild(iframe);
    } else {
      showStatus("Today's APOD is in an unsupported format (" + data.media_type + ").");
      return;
    }

    titleText.textContent = data.title || "";
    dateEl.textContent = data.date ? formatDate(data.date) : "";
    explanationEl.textContent = data.explanation || "";

    statusEl.classList.add("apod-hidden");
    mediaWrap.classList.remove("apod-hidden");
    overlay.classList.remove("apod-hidden");
  }

  function todayStr() {
    var d = new Date();
    var mm = String(d.getMonth() + 1).padStart(2, "0");
    var dd = String(d.getDate()).padStart(2, "0");
    return d.getFullYear() + "-" + mm + "-" + dd;
  }

  function getCache() {
    try {
      var raw = localStorage.getItem(CACHE_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch (e) {
      return null;
    }
  }

  function setCache(data) {
    try {
      localStorage.setItem(CACHE_KEY, JSON.stringify({ fetchedFor: todayStr(), data: data }));
    } catch (e) {
      /* ignore quota errors */
    }
  }

  function fetchApod() {
    // Use cached data if we already fetched today's APOD successfully
    var cached = getCache();
    if (cached && cached.fetchedFor === todayStr() && cached.data) {
      render(cached.data);
      return;
    }

    fetch(API_URL)
      .then(function (res) {
        if (!res.ok) {
          throw new Error("HTTP " + res.status);
        }
        return res.json();
      })
      .then(function (data) {
        setCache(data);
        render(data);
      })
      .catch(function (err) {
        // Fall back to last known good data if the request fails (e.g. rate limit)
        var fallback = getCache();
        if (fallback && fallback.data) {
          render(fallback.data);
        } else {
          showStatus("Couldn't load today's Astronomy Picture of the Day.\n(" + err.message + ")");
        }
      });
  }

  fetchApod();
  setInterval(fetchApod, REFRESH_INTERVAL);
})();
</script>

</body>
</html>
